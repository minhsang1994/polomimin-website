<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POLOMIMIN · Đăng ký</title>

    <!-- ========================================== -->
    <!-- 1. FONT: Inter (Google Fonts)             -->
    <!-- ========================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- ========================================== -->
    <!-- 4. CUSTOM CSS (Design Tokens)             -->
    <!-- ========================================== -->
    <style>
        /* ====== CSS VARIABLES ====== */
        :root {
            --primary: #1E3A8A;
            --primary-dark: #172554;
            --primary-light: #3B82F6;
            --primary-gradient: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            --teal: #14B8A6;

            --bg-body: #F1F5F9;
            --bg-surface: #FFFFFF;
            --bg-input: #F8FAFC;
            --bg-hover: #F1F5F9;

            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-light: #94A3B8;
            --text-white: #FFFFFF;

            --border-color: #E2E8F0;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 30px rgba(0, 0, 0, 0.10);
            --shadow-card: 0 8px 48px rgba(0, 0, 0, 0.06), 0 2px 12px rgba(0, 0, 0, 0.02);

            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
        }

        /* ====== BASE ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-surface: #1E293B;
            --bg-input: #1E293B;
            --bg-hover: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-light: #64748B;
            --border-color: #1E293B;
            --shadow-card: 0 8px 48px rgba(0, 0, 0, 0.4), 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* ====== REGISTER WRAPPER ====== */
        .register-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== REGISTER CARD ====== */
        .register-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            padding: 48px 40px 40px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* ====== LOGO ====== */
        .register-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .register-logo .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }
        .register-logo .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .register-logo .logo-text span {
            color: var(--teal);
        }

        /* ====== HEADER ====== */
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .register-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .register-header p {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* ====== FORM ====== */
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }
        .form-group .input-wrapper:focus-within {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            background: var(--bg-surface);
        }
        [data-theme="dark"] .form-group .input-wrapper:focus-within {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .form-group .input-wrapper .input-icon {
            padding: 0 14px 0 16px;
            color: var(--text-light);
            font-size: 18px;
            flex-shrink: 0;
        }
        .form-group .input-wrapper input {
            border: none;
            background: transparent;
            padding: 14px 16px 14px 0;
            font-size: 15px;
            width: 100%;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrapper input::placeholder {
            color: var(--text-light);
        }
        .form-group .input-wrapper .toggle-password {
            padding: 0 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            font-size: 18px;
            transition: all 0.2s ease;
        }
        .form-group .input-wrapper .toggle-password:hover {
            color: var(--text-secondary);
        }

        .form-error {
            color: #EF4444;
            font-size: 13px;
            display: none;
        }
        .form-error.visible {
            display: block;
        }

        /* ====== TERMS ====== */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-top: 4px;
        }
        .terms-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .terms-group label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1.5;
        }
        .terms-group label a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
        }
        .terms-group label a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ====== BUTTONS ====== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.25);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .btn-primary.loading .btn-text {
            display: none;
        }
        .btn-primary.loading .btn-loader {
            display: block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-google:hover {
            background: var(--bg-hover);
            border-color: var(--text-light);
            transform: scale(1.01);
        }
        .btn-google:active {
            transform: scale(0.98);
        }
        .btn-google .google-icon {
            width: 20px;
            height: 20px;
        }
        .btn-google .google-icon svg {
            width: 100%;
            height: 100%;
        }

        /* ====== DIVIDER ====== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-light);
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ====== LOGIN LINK ====== */
        .login-link {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        .login-link a {
            font-weight: 600;
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .login-link a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ====== FOOTER ====== */
        .register-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-light);
        }

        /* ====== THEME TOGGLE (floating) ====== */
        .theme-toggle-float {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 50;
            color: var(--text-secondary);
        }
        .theme-toggle-float:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        /* ====== TOAST ====== */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            width: 100%;
            max-width: 480px;
            padding: 0 16px;
        }
        .toast {
            background: var(--bg-surface);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            pointer-events: auto;
            animation: toastIn 0.4s ease forwards;
            width: 100%;
        }
        .toast.error {
            border-left: 4px solid #EF4444;
        }
        .toast.success {
            border-left: 4px solid #10B981;
        }
        .toast.info {
            border-left: 4px solid var(--primary-light);
        }
        .toast.hide {
            animation: toastOut 0.3s ease forwards;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* Password strength indicator */
        .password-strength {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .password-strength .bar {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: var(--border-color);
            transition: background 0.3s ease;
        }
        .password-strength .bar.active.weak {
            background: #EF4444;
        }
        .password-strength .bar.active.medium {
            background: #F59E0B;
        }
        .password-strength .bar.active.strong {
            background: #10B981;
        }
        .password-strength-text {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 640px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 40px;
            }
            .register-card {
                padding: 32px 24px 28px;
            }
            .register-logo .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .register-logo .logo-text {
                font-size: 24px;
            }
            .register-header h1 {
                font-size: 22px;
            }
            .register-header p {
                font-size: 14px;
            }
            .theme-toggle-float {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            .toast-container {
                top: 16px;
                padding: 0 12px;
            }
            .terms-group {
                align-items: flex-start;
            }
        }

        @media (max-width: 400px) {
            .register-card {
                padding: 24px 16px 20px;
            }
            .register-logo .logo-text {
                font-size: 20px;
            }
            .register-header h1 {
                font-size: 20px;
            }
            .form-group .input-wrapper input {
                font-size: 14px;
                padding: 12px 12px 12px 0;
            }
            .btn-primary,
            .btn-google {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- ========================================== -->
    <!-- TOAST CONTAINER                            -->
    <!-- ========================================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========================================== -->
    <!-- THEME TOGGLE (floating)                    -->
    <!-- ========================================== -->
    <button class="theme-toggle-float" id="themeToggle" aria-label="Chuyển đổi giao diện sáng/tối" title="Chuyển đổi theme">
        🌓
    </button>

    <!-- ========================================== -->
    <!-- REGISTER WRAPPER                           -->
    <!-- ========================================== -->
    <div class="register-wrapper">

        <div class="register-card" role="main" aria-label="Đăng ký tài khoản">

            <!-- Logo -->
            <div class="register-logo" aria-hidden="true">
                <div class="logo-icon" aria-hidden="true">P</div>
                <div class="logo-text">POLOMIMIN<span>.</span></div>
            </div>

            <!-- Header -->
            <header class="register-header">
                <h1>🚀 Tạo tài khoản</h1>
                <p>Bắt đầu hành trình với POLOMIMIN Platform</p>
            </header>

            <!-- Form -->
            <form class="register-form" id="registerForm" novalidate aria-label="Form đăng ký">

                <!-- Full Name -->
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">👤</span>
                        <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="Nguyễn Văn A"
                        required
                        autocomplete="name"
                        aria-describedby="fullname-error"
                        />
                    </div>
                    <span class="form-error" id="fullname-error">Vui lòng nhập họ tên</span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">📧</span>
                        <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="name@POLOMIMIN.com"
                        required
                        autocomplete="email"
                        aria-describedby="email-error"
                        />
                    </div>
                    <span class="form-error" id="email-error">Vui lòng nhập email hợp lệ</span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">🔒</span>
                        <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ít nhất 6 ký tự"
                        required
                        autocomplete="new-password"
                        aria-describedby="password-error"
                        minlength="6"
                        />
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiển thị mật khẩu" tabindex="-1">
                            👁️
                        </button>
                    </div>
                    <span class="form-error" id="password-error">Mật khẩu phải có ít nhất 6 ký tự</span>
                    <!-- Password strength indicator -->
                    <div class="password-strength" id="passwordStrength">
                        <span class="bar" id="strengthBar1"></span>
                        <span class="bar" id="strengthBar2"></span>
                        <span class="bar" id="strengthBar3"></span>
                    </div>
                    <div class="password-strength-text" id="strengthText">Mật khẩu yếu</div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">✓</span>
                        <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Nhập lại mật khẩu"
                        required
                        autocomplete="new-password"
                        aria-describedby="confirm-error"
                        />
                    </div>
                    <span class="form-error" id="confirm-error">Mật khẩu không khớp</span>
                </div>

                <!-- Terms -->
                <div class="terms-group">
                    <input type="checkbox" id="terms" required />
                    <label for="terms">
                        Tôi đồng ý với
                        <a href="#" id="termsLink">Điều khoản dịch vụ</a>
                        và
                        <a href="#" id="privacyLink">Chính sách bảo mật</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">Tạo tài khoản</span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>

                <!-- Divider -->
                <div class="divider">Hoặc tiếp tục với</div>

                <!-- Google Button -->
                <button type="button" class="btn-google" id="googleBtn">
                    <span class="google-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </span>
                    Đăng ký với Google
                </button>

            </form>

            <!-- Login Link -->
            <div class="login-link">
                Đã có tài khoản? <a href="#" id="loginLink">Đăng nhập</a>
            </div>

            <!-- Footer -->
            <footer class="register-footer">
                POLOMIMIN Platform v1.0 · Bảo mật &amp; An toàn
            </footer>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT ENGINE                          -->
    <!-- ========================================== -->
    <script>
        (function() {
            'use strict';

            // ====== DOM REFS ======
            const form = document.getElementById('registerForm');
            const fullnameInput = document.getElementById('fullname');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const registerBtn = document.getElementById('registerBtn');
            const togglePassword = document.getElementById('togglePassword');
            const googleBtn = document.getElementById('googleBtn');
            const loginLink = document.getElementById('loginLink');
            const termsLink = document.getElementById('termsLink');
            const privacyLink = document.getElementById('privacyLink');
            const termsCheckbox = document.getElementById('terms');
            const themeToggle = document.getElementById('themeToggle');
            const toastContainer = document.getElementById('toastContainer');

            // Password strength elements
            const strengthBars = [
                document.getElementById('strengthBar1'),
                document.getElementById('strengthBar2'),
                document.getElementById('strengthBar3')
            ];
            const strengthText = document.getElementById('strengthText');

            // Error elements
            const fullnameError = document.getElementById('fullname-error');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            const confirmError = document.getElementById('confirm-error');

            // ====== THEME ======
            const THEME_KEY = 'POLOMIMIN-theme';

            function getTheme() {
                return localStorage.getItem(THEME_KEY) || 'light';
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem(THEME_KEY, theme);
                themeToggle.textContent = theme === 'light' ? '🌓' : '☀️';
            }

            function toggleTheme() {
                const current = getTheme();
                const next = current === 'light' ? 'dark' : 'light';
                setTheme(next);
            }

            // ====== TOAST ======
            function showToast(message, type = 'info', icon = '💡') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('hide');
                    setTimeout(() => toast.remove(), 350);
                }, 3000);
            }

            // ====== PASSWORD TOGGLE ======
            let passwordVisible = false;
            togglePassword.addEventListener('click', function() {
                passwordVisible = !passwordVisible;
                passwordInput.type = passwordVisible ? 'text' : 'password';
                confirmInput.type = passwordVisible ? 'text' : 'password';
                this.textContent = passwordVisible ? '🙈' : '👁️';
                this.setAttribute('aria-label', passwordVisible ? 'Ẩn mật khẩu' : 'Hiển thị mật khẩu');
            });

            // ====== PASSWORD STRENGTH ======
            function checkPasswordStrength(password) {
                let score = 0;
                if (password.length >= 6) score++;
                if (password.length >= 10) score++;
                if (/[A-Z]/.test(password) && /[a-z]/.test(password) && /[0-9]/.test(password)) score++;
                if (/[^A-Za-z0-9]/.test(password)) score++;
                return Math.min(score, 3);
            }

            function updatePasswordStrength(password) {
                const strength = checkPasswordStrength(password);
                const labels = ['Yếu', 'Trung bình', 'Mạnh'];
                const colors = ['weak', 'medium', 'strong'];

                strengthBars.forEach((bar, index) => {
                    bar.className = 'bar';
                    if (index < strength) {
                        bar.classList.add('active', colors[strength - 1]);
                    }
                });

                if (password.length === 0) {
                    strengthText.textContent = 'Nhập mật khẩu';
                } else {
                    strengthText.textContent = `Mật khẩu ${labels[strength - 1] || 'Yếu'}`;
                }
            }

            passwordInput.addEventListener('input', function() {
                updatePasswordStrength(this.value);
                // Real-time confirm validation
                if (confirmInput.value && confirmInput.value !== this.value) {
                    confirmError.classList.add('visible');
                } else {
                    confirmError.classList.remove('visible');
                }
                // Real-time password validation
                if (this.value && this.value.length < 6) {
                    passwordError.classList.add('visible');
                } else {
                    passwordError.classList.remove('visible');
                }
            });

            confirmInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    confirmError.classList.add('visible');
                } else {
                    confirmError.classList.remove('visible');
                }
            });

            // ====== FORM VALIDATION ======
            function validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            function showError(errorEl, show) {
                if (show) {
                    errorEl.classList.add('visible');
                } else {
                    errorEl.classList.remove('visible');
                }
            }

            // ====== FORM SUBMIT ======
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Reset errors
                showError(fullnameError, false);
                showError(emailError, false);
                showError(passwordError, false);
                showError(confirmError, false);

                const fullname = fullnameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirm = confirmInput.value;
                let isValid = true;

                // Validate fullname
                if (!fullname || fullname.length < 2) {
                    showError(fullnameError, true);
                    isValid = false;
                }

                // Validate email
                if (!email || !validateEmail(email)) {
                    showError(emailError, true);
                    isValid = false;
                }

                // Validate password
                if (!password || password.length < 6) {
                    showError(passwordError, true);
                    isValid = false;
                }

                // Validate confirm
                if (!confirm || confirm !== password) {
                    showError(confirmError, true);
                    isValid = false;
                }

                // Validate terms
                if (!termsCheckbox.checked) {
                    showToast('Vui lòng đồng ý với Điều khoản dịch vụ', 'error', '⚠️');
                    isValid = false;
                }

                if (!isValid) {
                    showToast('Vui lòng kiểm tra lại thông tin đăng ký', 'error', '⚠️');
                    return;
                }

                // Simulate registration
                registerBtn.disabled = true;
                registerBtn.classList.add('loading');

                setTimeout(() => {
                    registerBtn.disabled = false;
                    registerBtn.classList.remove('loading');
                    showToast('✅ Đăng ký thành công! Chào mừng bạn đến với POLOMIMIN.', 'success', '🎉');
                    // Reset form
                    form.reset();
                    strengthBars.forEach(bar => bar.className = 'bar');
                    strengthText.textContent = 'Nhập mật khẩu';
                    console.log('🚀 Redirect to login.html');
                }, 1800);
            });

            // ====== REAL-TIME VALIDATION ======
            fullnameInput.addEventListener('blur', function() {
                if (this.value.trim() && this.value.trim().length < 2) {
                    showError(fullnameError, true);
                } else {
                    showError(fullnameError, false);
                }
            });

            emailInput.addEventListener('blur', function() {
                const email = this.value.trim();
                if (email && !validateEmail(email)) {
                    showError(emailError, true);
                } else {
                    showError(emailError, false);
                }
            });

            // ====== GOOGLE REGISTER ======
            googleBtn.addEventListener('click', function() {
                showToast('🔑 Đang chuyển hướng đến Google...', 'info', '🌐');
                setTimeout(() => {
                    showToast('✅ Đăng ký Google thành công!', 'success', '🎉');
                }, 1200);
            });

            // ====== LINKS ======
            loginLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('🔐 Chuyển đến trang đăng nhập...', 'info', '🔐');
                setTimeout(() => {
                    alert('🚀 Chuyển đến 03_login.html');
                }, 300);
            });

            termsLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('📋 Điều khoản dịch vụ POLOMIMIN', 'info', '📄');
            });

            privacyLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('🔒 Chính sách bảo mật POLOMIMIN', 'info', '🔒');
            });

            // ====== THEME TOGGLE ======
            themeToggle.addEventListener('click', toggleTheme);

            // ====== KEYBOARD SHORTCUTS ======
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.activeElement?.blur();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                    e.preventDefault();
                    toggleTheme();
                }
            });

            // ====== INIT ======
            setTheme(getTheme());

            // Auto-focus fullname on load (desktop only)
            if (window.innerWidth > 640) {
                fullnameInput.focus();
            }

            console.log('✅ POLOMIMIN Register (POLOMIMIN HTML STANDARD v1.0) initialized.');
        })();
    </script>

</body>
</html>
