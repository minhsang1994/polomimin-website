<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - POLOMIMIN</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            background: linear-gradient(135deg, #1E3A8A 0%, #14B8A6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .logo-icon {
            width: 56px;
            height: 56px;
            border: 2px solid #1E3A8A;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #1E3A8A;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 20px;
            font-weight: 800;
            color: #0F172A;
        }
        .login-logo p {
            color: #94A3B8;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #0F172A;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1E3A8A;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1E3A8A, #14B8A6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #94A3B8;
            font-size: 13px;
        }
        .login-footer a {
            color: #1E3A8A;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">P</div>
            <h1>POLOMIMIN</h1>
            <p>Hệ thống quản lý doanh nghiệp</p>
        </div>
        <form>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@polomimin.vn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        <div class="login-footer">
            © 2026 POLOMIMIN - <a href="index.html">Về trang chủ</a>
        </div>
    </div>
</body>
</html>
