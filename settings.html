<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt - POLOMIMIN</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body { background: #F8FAFC; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 40px; }
        .page-header h1 { font-size: 32px; font-weight: 800; color: #0F172A; }
        .page-header p { color: #94A3B8; margin-top: 8px; }
        .settings-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .settings-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #E2E8F0;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }
        .setting-label { color: #475569; font-size: 14px; }
        .btn {
            padding: 10px 20px;
            background: #1E3A8A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #172554; }
        .back-home { text-align: center; margin-top: 32px; }
        .back-home a { color: #1E3A8A; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-cog"></i> Cài đặt</h1>
            <p>Quản lý tài khoản và hệ thống POLOMIMIN</p>
        </div>

        <div class="settings-card">
            <h2><i class="fas fa-user"></i> Tài khoản</h2>
            <div class="setting-item">
                <span class="setting-label">Họ tên</span>
                <span>Hồ Minh Sang</span>
            </div>
            <div class="setting-item">
                <span class="setting-label">Email</span>
                <span>admin@polomimin.vn</span>
            </div>
            <div class="setting-item">
                <span class="setting-label">Vai trò</span>
                <span>Super Admin</span>
            </div>
        </div>

        <div class="settings-card">
            <h2><i class="fas fa-paint-brush"></i> Giao diện</h2>
            <div class="setting-item">
                <span class="setting-label">Theme</span>
                <span>Light Mode</span>
            </div>
            <div class="setting-item">
                <span class="setting-label">Ngôn ngữ</span>
                <span>Tiếng Việt</span>
            </div>
        </div>

        <div class="settings-card">
            <h2><i class="fas fa-bell"></i> Thông báo</h2>
            <div class="setting-item">
                <span class="setting-label">Email notifications</span>
                <span>Bật</span>
            </div>
            <div class="setting-item">
                <span class="setting-label">Push notifications</span>
                <span>Tắt</span>
            </div>
        </div>

        <div class="back-home">
            <a href="index.html">← Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
