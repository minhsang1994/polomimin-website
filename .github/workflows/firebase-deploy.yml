name: Deploy POLOMIMIN to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (polomimin.web.app)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Verify deployment
        run: |
          echo "✅ Deployed to https://polomimin.web.app"
          echo ""
          echo "Note: Primary domain is https://polomimin.shop (GitHub Pages + Cloudflare)"
          echo "Firebase URL is a mirror/backup. Both kept in sync via this workflow."

      - name: Slack/Discord notification (optional)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Firebase deploy OK at $(date -u)"
          else
            echo "❌ Firebase deploy FAILED"
            exit 1
          fi
