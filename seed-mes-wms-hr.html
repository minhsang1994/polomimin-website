// ══ SEED FUNCTION ══════════════════════════════════════════════════════════════

let totalWritten = 0;

async function runSeed() {
    document.getElementById('seedBtn').disabled = true;
    document.getElementById('log').innerHTML = '';
    totalWritten = 0;

    for (const [collPath, docs] of Object.entries(SEED_DATA)) {
        log(collPath, collPath, '⏳ Đang ghi...', 'running');
        let ok = 0;
        for (let i = 0; i < docs.length; i++) {
            const doc = docs[i];
            const docId = doc.ref || doc.id || `doc-${i+1}`;
            try {
                await db.collection(collPath).doc(docId).set(doc, { merge: true });
                ok++;
            } catch(e) {
                log(collPath, collPath, `❌ Lỗi doc ${docId}: ${e.message}`, 'err');
            }
        }
        totalWritten += ok;
        log(collPath, collPath, `✅ ${ok}/${docs.length} documents`, 'ok');
    }

    document.getElementById('countEl').textContent = totalWritten;
    document.getElementById('summary').style.display = 'block';
    document.getElementById('seedBtn').disabled = false;
    log('done', 'HOÀN TẤT', `🎉 Seed xong! Tổng ${totalWritten} documents vào ${Object.keys(SEED_DATA).length} collections`, 'ok');
}

async function runClear() {
    if (!confirm('Xóa toàn bộ data MES + WMS + HR?')) return;
    document.getElementById('log').innerHTML = '';
    for (const collPath of Object.keys(SEED_DATA)) {
        log('del-'+collPath, 'XÓA: '+collPath, '⏳ Đang xóa...', 'running');
        try {
            const snap = await db.collection(collPath).get();
            const batch = db.batch();
            snap.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            log('del-'+collPath, 'XÓA: '+collPath, `✅ Đã xóa ${snap.size} docs`, 'ok');
        } catch(e) {
            log('del-'+collPath, 'XÓA: '+collPath, `❌ ${e.message}`, 'err');
        }
    }
}
