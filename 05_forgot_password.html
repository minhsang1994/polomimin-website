<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIMIN · Quên mật khẩu</title>

    <!-- ========================================== -->
    <!-- 1. FONT: Inter (Google Fonts)             -->
    <!-- ========================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- ========================================== -->
    <!-- 3. CUSTOM CSS (Design Tokens)             -->
    <!-- ========================================== -->
    <style>
        /* ====== CSS VARIABLES ====== */
        :root {
            --primary: #1E3A8A;
            --primary-dark: #172554;
            --primary-light: #3B82F6;
            --primary-gradient: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            --teal: #14B8A6;

            --bg-body: #F1F5F9;
            --bg-surface: #FFFFFF;
            --bg-input: #F8FAFC;
            --bg-hover: #F1F5F9;

            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-light: #94A3B8;
            --text-white: #FFFFFF;

            --border-color: #E2E8F0;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 30px rgba(0, 0, 0, 0.10);
            --shadow-card: 0 8px 48px rgba(0, 0, 0, 0.06), 0 2px 12px rgba(0, 0, 0, 0.02);

            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
        }

        /* ====== BASE ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-surface: #1E293B;
            --bg-input: #1E293B;
            --bg-hover: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-light: #64748B;
            --border-color: #1E293B;
            --shadow-card: 0 8px 48px rgba(0, 0, 0, 0.4), 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* ====== FORGOT WRAPPER ====== */
        .forgot-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== FORGOT CARD ====== */
        .forgot-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            padding: 48px 40px 40px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* ====== LOGO ====== */
        .forgot-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .forgot-logo .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }
        .forgot-logo .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .forgot-logo .logo-text span {
            color: var(--teal);
        }

        /* ====== HEADER ====== */
        .forgot-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .forgot-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .forgot-header p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ====== SUCCESS STATE ====== */
        .success-state {
            display: none;
            text-align: center;
            padding: 16px 0 8px;
        }
        .success-state .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .success-state h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .success-state p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .success-state .email-highlight {
            display: inline-block;
            background: var(--bg-hover);
            padding: 2px 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 4px;
        }
        .success-state .back-link {
            display: inline-block;
            margin-top: 20px;
            font-weight: 600;
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .success-state .back-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ====== FORM ====== */
        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .forgot-form.hidden {
            display: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }
        .form-group .input-wrapper:focus-within {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            background: var(--bg-surface);
        }
        [data-theme="dark"] .form-group .input-wrapper:focus-within {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .form-group .input-wrapper .input-icon {
            padding: 0 14px 0 16px;
            color: var(--text-light);
            font-size: 18px;
            flex-shrink: 0;
        }
        .form-group .input-wrapper input {
            border: none;
            background: transparent;
            padding: 14px 16px 14px 0;
            font-size: 15px;
            width: 100%;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrapper input::placeholder {
            color: var(--text-light);
        }

        .form-error {
            color: #EF4444;
            font-size: 13px;
            display: none;
        }
        .form-error.visible {
            display: block;
        }

        /* ====== BUTTONS ====== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.25);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .btn-primary.loading .btn-text {
            display: none;
        }
        .btn-primary.loading .btn-loader {
            display: block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ====== DIVIDER ====== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-light);
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ====== LOGIN LINK ====== */
        .login-link {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        .login-link a {
            font-weight: 600;
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .login-link a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ====== FOOTER ====== */
        .forgot-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-light);
        }

        /* ====== THEME TOGGLE (floating) ====== */
        .theme-toggle-float {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 50;
            color: var(--text-secondary);
        }
        .theme-toggle-float:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        /* ====== TOAST ====== */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            width: 100%;
            max-width: 480px;
            padding: 0 16px;
        }
        .toast {
            background: var(--bg-surface);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            pointer-events: auto;
            animation: toastIn 0.4s ease forwards;
            width: 100%;
        }
        .toast.error {
            border-left: 4px solid #EF4444;
        }
        .toast.success {
            border-left: 4px solid #10B981;
        }
        .toast.info {
            border-left: 4px solid var(--primary-light);
        }
        .toast.hide {
            animation: toastOut 0.3s ease forwards;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 640px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 40px;
            }
            .forgot-card {
                padding: 32px 24px 28px;
            }
            .forgot-logo .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .forgot-logo .logo-text {
                font-size: 24px;
            }
            .forgot-header h1 {
                font-size: 22px;
            }
            .forgot-header p {
                font-size: 14px;
            }
            .theme-toggle-float {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            .toast-container {
                top: 16px;
                padding: 0 12px;
            }
            .success-state .success-icon {
                font-size: 48px;
            }
            .success-state h3 {
                font-size: 18px;
            }
        }

        @media (max-width: 400px) {
            .forgot-card {
                padding: 24px 16px 20px;
            }
            .forgot-logo .logo-text {
                font-size: 20px;
            }
            .forgot-header h1 {
                font-size: 20px;
            }
            .form-group .input-wrapper input {
                font-size: 14px;
                padding: 12px 12px 12px 0;
            }
            .btn-primary {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- ========================================== -->
    <!-- TOAST CONTAINER                            -->
    <!-- ========================================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========================================== -->
    <!-- THEME TOGGLE (floating)                    -->
    <!-- ========================================== -->
    <button class="theme-toggle-float" id="themeToggle" aria-label="Chuyển đổi giao diện sáng/tối" title="Chuyển đổi theme">
        🌓
    </button>

    <!-- ========================================== -->
    <!-- FORGOT PASSWORD WRAPPER                    -->
    <!-- ========================================== -->
    <div class="forgot-wrapper">

        <div class="forgot-card" role="main" aria-label="Quên mật khẩu">

            <!-- Logo -->
            <div class="forgot-logo" aria-hidden="true">
                <div class="logo-icon">M</div>
                <div class="logo-text">MIMIN<span>.</span></div>
            </div>

            <!-- Header -->
            <header class="forgot-header">
                <h1>🔑 Quên mật khẩu</h1>
                <p>Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu</p>
            </header>

            <!-- ====== FORM ====== -->
            <form class="forgot-form" id="forgotForm" novalidate aria-label="Form quên mật khẩu">

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">📧</span>
                        <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="name@mimin.com"
                        required
                        autocomplete="email"
                        aria-describedby="email-error"
                        />
                    </div>
                    <span class="form-error" id="email-error">Vui lòng nhập email hợp lệ</span>
                </div>

                <button type="submit" class="btn-primary" id="sendBtn">
                    <span class="btn-text">Gửi hướng dẫn</span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>

                <!-- Divider -->
                <div class="divider">Hoặc</div>

                <!-- Back to Login -->
                <div class="login-link">
                    <a href="#" id="loginLink">← Quay lại đăng nhập</a>
                </div>

            </form>

            <!-- ====== SUCCESS STATE ====== -->
            <div class="success-state" id="successState">
                <span class="success-icon" aria-hidden="true">📬</span>
                <h3>Email đã được gửi!</h3>
                <p>
                    Chúng tôi đã gửi hướng dẫn đặt lại mật khẩu đến
                    <br />
                    <span class="email-highlight" id="sentEmail">name@mimin.com</span>
                </p>
                <a href="#" class="back-link" id="backToLogin">← Quay lại đăng nhập</a>
            </div>

            <!-- Footer -->
            <footer class="forgot-footer">
                MIMIN Platform v1.0 · Bảo mật &amp; An toàn
            </footer>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT ENGINE                          -->
    <!-- ========================================== -->
    <script>
        (function() {
            'use strict';

            // ====== DOM REFS ======
            const form = document.getElementById('forgotForm');
            const emailInput = document.getElementById('email');
            const sendBtn = document.getElementById('sendBtn');
            const loginLink = document.getElementById('loginLink');
            const backToLogin = document.getElementById('backToLogin');
            const successState = document.getElementById('successState');
            const sentEmail = document.getElementById('sentEmail');
            const themeToggle = document.getElementById('themeToggle');
            const toastContainer = document.getElementById('toastContainer');
            const emailError = document.getElementById('email-error');

            // ====== THEME ======
            const THEME_KEY = 'mimin-theme';

            function getTheme() {
                return localStorage.getItem(THEME_KEY) || 'light';
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem(THEME_KEY, theme);
                themeToggle.textContent = theme === 'light' ? '🌓' : '☀️';
            }

            function toggleTheme() {
                const current = getTheme();
                const next = current === 'light' ? 'dark' : 'light';
                setTheme(next);
            }

            // ====== TOAST ======
            function showToast(message, type = 'info', icon = '💡') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('hide');
                    setTimeout(() => toast.remove(), 350);
                }, 3000);
            }

            // ====== FORM VALIDATION ======
            function validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            function showError(errorEl, show) {
                if (show) {
                    errorEl.classList.add('visible');
                } else {
                    errorEl.classList.remove('visible');
                }
            }

            // ====== FORM SUBMIT ======
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Reset error
                showError(emailError, false);

                const email = emailInput.value.trim();

                // Validate
                if (!email || !validateEmail(email)) {
                    showError(emailError, true);
                    showToast('Vui lòng nhập email hợp lệ', 'error', '⚠️');
                    return;
                }

                // Simulate sending
                sendBtn.disabled = true;
                sendBtn.classList.add('loading');

                setTimeout(() => {
                    sendBtn.disabled = false;
                    sendBtn.classList.remove('loading');

                    // Show success state
                    sentEmail.textContent = email;
                    form.classList.add('hidden');
                    successState.style.display = 'block';

                    showToast('✅ Hướng dẫn đặt lại mật khẩu đã được gửi!', 'success', '📬');

                    console.log(`📧 Reset password link sent to: ${email}`);
                }, 1500);
            });

            // ====== REAL-TIME VALIDATION ======
            emailInput.addEventListener('blur', function() {
                const email = this.value.trim();
                if (email && !validateEmail(email)) {
                    showError(emailError, true);
                } else {
                    showError(emailError, false);
                }
            });

            emailInput.addEventListener('input', function() {
                const email = this.value.trim();
                if (email && !validateEmail(email)) {
                    showError(emailError, true);
                } else {
                    showError(emailError, false);
                }
            });

            // ====== LINKS ======
            loginLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('🔐 Chuyển đến trang đăng nhập...', 'info', '🔐');
                setTimeout(() => {
                    alert('🚀 Chuyển đến 03_login.html');
                }, 300);
            });

            backToLogin.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('🔐 Chuyển đến trang đăng nhập...', 'info', '🔐');
                setTimeout(() => {
                    alert('🚀 Chuyển đến 03_login.html');
                }, 300);
            });

            // ====== THEME TOGGLE ======
            themeToggle.addEventListener('click', toggleTheme);

            // ====== KEYBOARD SHORTCUTS ======
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.activeElement?.blur();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                    e.preventDefault();
                    toggleTheme();
                }
            });

            // ====== INIT ======
            setTheme(getTheme());

            // Auto-focus email on load (desktop only)
            if (window.innerWidth > 640) {
                emailInput.focus();
            }

            console.log('✅ MIMIN Forgot Password (MIMIN HTML STANDARD v1.0) initialized.');
        })();
    </script>

</body>
</html>
